services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      APP_ENV: ${APP_ENV}
      TRUST_PROXY: ${TRUST_PROXY}
      API_URL: http://api:4000
      ADMIN_URL: http://admin:4100
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.platform-frontend.rule=Host(`${FRONTEND_DOMAIN}`)
      - traefik.http.routers.platform-frontend.entrypoints=${TRAEFIK_ENTRYPOINTS}
      - traefik.http.routers.platform-frontend.tls=true
      - traefik.http.services.platform-frontend.loadbalancer.server.port=3000
      - traefik.docker.network=platform-network
    networks:
      - platform-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      APP_ENV: ${APP_ENV}
      TRUST_PROXY: ${TRUST_PROXY}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT}:4000"
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.platform-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.platform-api.entrypoints=${TRAEFIK_ENTRYPOINTS}
      - traefik.http.routers.platform-api.tls=true
      - traefik.http.services.platform-api.loadbalancer.server.port=4000
      - traefik.docker.network=platform-network
    networks:
      - platform-network

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      HOST: 0.0.0.0
      PORT: 4100
      APP_ENV: ${APP_ENV}
      TRUST_PROXY: ${TRUST_PROXY}
      API_URL: http://api:4000
      FRONTEND_URL: http://frontend:3000
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "4100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.platform-admin.rule=Host(`${ADMIN_DOMAIN}`)
      - traefik.http.routers.platform-admin.entrypoints=${TRAEFIK_ENTRYPOINTS}
      - traefik.http.routers.platform-admin.tls=true
      - traefik.http.services.platform-admin.loadbalancer.server.port=4100
      - traefik.docker.network=platform-network
    networks:
      - platform-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./services/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform-network

networks:
  platform-network:
    name: platform-network
    driver: bridge

volumes:
  postgres_data:
    name: platform_postgres_data
  redis_data:
    name: platform_redis_data

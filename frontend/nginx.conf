map $http_x_forwarded_host $tenant_forwarded_host {
  default $http_x_forwarded_host;
  "" $host;
}

map $http_x_forwarded_proto $tenant_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

# WebSocket upgrade: pass "upgrade" through for WS handshakes, "close" otherwise.
map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

# Social-preview crawlers don't execute JavaScript, so the SPA shell gives them
# a blank unfurl. Route them to the backend /api/og/ view, which renders
# tenant-aware OG tags (restaurant name, photo) for the requested host/path.
# Humans are never matched — their requests fall through to the SPA as usual.
map $http_user_agent $is_social_bot {
  default 0;
  "~*whatsapp"             1;
  "~*facebookexternalhit"  1;
  "~*facebot"              1;
  "~*twitterbot"           1;
  "~*telegrambot"          1;
  "~*linkedinbot"          1;
  "~*slackbot"             1;
  "~*discordbot"           1;
  "~*pinterest"            1;
  "~*vkshare"              1;
}

# ── Security headers shared across all location blocks ────────────────────────
# IMPORTANT (nginx gotcha): when a location block defines any add_header
# directive, all add_header directives from the enclosing server/http block
# are silently dropped for that location.  Security headers must therefore be
# repeated in every location block that also sets its own Cache-Control etc.
# The macro below keeps things DRY; add it after any cache/content headers in
# each block so they always appear in every response.
#
# X-Frame-Options: DENY            — clickjacking protection
# X-Content-Type-Options: nosniff  — MIME-type sniffing protection
# Referrer-Policy                  — avoids leaking URLs with tokens to 3rd parties
# Permissions-Policy               — restrict camera/mic/geo/payment
# Content-Security-Policy          — limits script/style/connect sources;
#   'unsafe-inline' for style-src is required by Vue's :style bindings.
#   Update connect-src if you add third-party analytics or push endpoints.

server {
  # Non-root nginx listens on unprivileged port 3000 (UID 101 binds it fine —
  # 3000 > 1024, no root/CAP_NET_BIND_SERVICE needed). This is the original port
  # Coolify's routing targets; R13 had moved it to 8080, which desynced from
  # Coolify's domain config and caused a 502 — reverted to 3000.
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 10m;
  server_tokens off;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_requests 1000;
  open_file_cache max=1000 inactive=60s;
  open_file_cache_valid 30s;
  open_file_cache_min_uses 2;
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml text/javascript application/wasm font/woff2;

  # Tenant-branded PWA manifest — served by backend, must be proxied before
  # the catch-all location / rule (which would otherwise return index.html).
  location = /app-manifest.json {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    add_header Cache-Control "public, max-age=3600" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: https: blob:; connect-src 'self' https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; frame-src https://accounts.google.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  }

  # SEO sitemap — served by Django (config/sitemap.py) on the public schema.
  # Must be proxied before the catch-all location / rule, otherwise try_files
  # returns the SPA index.html shell instead of the XML (the .xml extension is
  # not in the static-asset regex below). Mirrors the /app-manifest.json proxy.
  location = /sitemap.xml {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    add_header Cache-Control "public, max-age=3600" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
  }

  # SSE endpoint: unbuffered so events reach the client immediately.
  # Prefix-match (the real path carries an order id, e.g. /api/marketplace/track/ORD-1/?stream=1).
  # Must be placed BEFORE the general ^~ /api/ block.
  location ^~ /api/marketplace/track/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
    chunked_transfer_encoding on;
    add_header X-Accel-Buffering "no";
  }

  location ^~ /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    # Django SecurityMiddleware already sets security headers for API responses.
  }

  # WebSocket endpoint → backend ASGI (uvicorn). Requires the Upgrade/Connection
  # headers and HTTP/1.1; long read timeout keeps the mostly-idle socket open.
  # The backend must be served under ASGI for this to return 101 (see entrypoint).
  location ^~ /ws/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_redirect off;
  }

  # DRF browsable API login — only active in Django when DJANGO_DEBUG=True.
  # Keep this nginx block so the proxy still routes the path if needed in dev;
  # in production the Django view simply returns 404.
  location ^~ /api-auth/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
  }

  # Django admin panel.  The default path matches DJANGO_ADMIN_URL default
  # ("admin/").  If you change DJANGO_ADMIN_URL to a different prefix in
  # Coolify, update this location block to match the new path and redeploy.
  location ^~ /admin/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
  }

  # Media files: served directly from the shared Docker volume.
  # The volume is mounted read-only at /app/media in this container.
  # Using alias so nginx maps /media/x -> /app/media/x without double prefix.
  location ^~ /media/ {
    alias /app/media/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    # Restrictive CSP for media: no scripts, no forms — these are asset files.
    add_header Content-Security-Policy "default-src 'none'; img-src 'self'; media-src 'self'; style-src 'unsafe-inline'; frame-ancestors 'none'" always;
    try_files $uri =404;
  }

  # Serve Django staticfiles directly from the shared static_data volume —
  # no uvicorn round-trip. Populated by collectstatic in entrypoint.sh before
  # the api container becomes healthy (and nginx waits for api healthy).
  location ^~ /static/ {
    alias /app/staticfiles/;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  location = /health {
    access_log off;
    add_header Content-Type "text/plain" always;
    return 200 'ok';
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: https: blob:; connect-src 'self' https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; frame-src https://accounts.google.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    try_files $uri =404;
  }

  location ^~ /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  location / {
    # Social bots → backend OG view ("if" + "rewrite ... last" is one of the
    # documented-safe if() uses in nginx; it re-enters location matching and
    # lands on the ^~ /api/ proxy block above). $uri is the normalized path
    # without the query string; the trailing "?" stops nginx re-appending it.
    if ($is_social_bot) {
      rewrite ^ /api/og/?path=$uri? last;
    }
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: https: blob:; connect-src 'self' https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; frame-src https://accounts.google.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    try_files $uri $uri/ /index.html;
  }
}

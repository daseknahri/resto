map $http_x_forwarded_host $tenant_forwarded_host {
  default $http_x_forwarded_host;
  "" $host;
}

map $http_x_forwarded_proto $tenant_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

# WebSocket upgrade: pass "upgrade" through for WS handshakes, "close" otherwise.
map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

# ── Security headers shared across all location blocks ────────────────────────
# IMPORTANT (nginx gotcha): when a location block defines any add_header
# directive, all add_header directives from the enclosing server/http block
# are silently dropped for that location.  Security headers must therefore be
# repeated in every location block that also sets its own Cache-Control etc.
# The macro below keeps things DRY; add it after any cache/content headers in
# each block so they always appear in every response.
#
# X-Frame-Options: DENY            — clickjacking protection
# X-Content-Type-Options: nosniff  — MIME-type sniffing protection
# Referrer-Policy                  — avoids leaking URLs with tokens to 3rd parties
# Permissions-Policy               — restrict camera/mic/geo/payment
# Content-Security-Policy          — limits script/style/connect sources;
#   'unsafe-inline' for style-src is required by Vue's :style bindings.
#   Update connect-src if you add third-party analytics or push endpoints.

server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 10m;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

  # Tenant-branded PWA manifest — served by backend, must be proxied before
  # the catch-all location / rule (which would otherwise return index.html).
  location = /app-manifest.json {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    add_header Cache-Control "public, max-age=3600" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: https: blob:; connect-src 'self' https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; frame-src https://accounts.google.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  }

  location ^~ /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    # Django SecurityMiddleware already sets security headers for API responses.
  }

  # WebSocket endpoint → backend ASGI (uvicorn). Requires the Upgrade/Connection
  # headers and HTTP/1.1; long read timeout keeps the mostly-idle socket open.
  # The backend must be served under ASGI for this to return 101 (see entrypoint).
  location ^~ /ws/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_redirect off;
  }

  # DRF browsable API login — only active in Django when DJANGO_DEBUG=True.
  # Keep this nginx block so the proxy still routes the path if needed in dev;
  # in production the Django view simply returns 404.
  location ^~ /api-auth/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
  }

  # Django admin panel.  The default path matches DJANGO_ADMIN_URL default
  # ("admin/").  If you change DJANGO_ADMIN_URL to a different prefix in
  # Coolify, update this location block to match the new path and redeploy.
  location ^~ /admin/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
  }

  # Media files: served directly from the shared Docker volume.
  # The volume is mounted read-only at /app/media in this container.
  # Using alias so nginx maps /media/x -> /app/media/x without double prefix.
  location ^~ /media/ {
    alias /app/media/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    # Restrictive CSP for media: no scripts, no forms — these are asset files.
    add_header Content-Security-Policy "default-src 'none'; img-src 'self'; media-src 'self'; style-src 'unsafe-inline'; frame-ancestors 'none'" always;
    try_files $uri =404;
  }

  location ^~ /static/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: https: blob:; connect-src 'self' https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; frame-src https://accounts.google.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    try_files $uri =404;
  }

  location ^~ /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri =404;
  }

  location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src 'self' data: https: blob:; connect-src 'self' https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; frame-src https://accounts.google.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    try_files $uri $uri/ /index.html;
  }
}

map $http_x_forwarded_host $tenant_forwarded_host {
  default $http_x_forwarded_host;
  "" $host;
}

map $http_x_forwarded_proto $tenant_forwarded_proto {
  default $http_x_forwarded_proto;
  "" $scheme;
}

server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 10m;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

  # Tenant-branded PWA manifest — served by backend, must be proxied before
  # the catch-all location / rule (which would otherwise return index.html).
  location = /app-manifest.json {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    add_header Cache-Control "public, max-age=3600" always;
  }

  location ^~ /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
  }

  location ^~ /api-auth/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
  }

  location ^~ /admin/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
  }

  # Media files: served directly from the shared Docker volume.
  # The volume is mounted read-only at /app/media in this container.
  # Using alias so nginx maps /media/x -> /app/media/x without double prefix.
  location ^~ /media/ {
    alias /app/media/;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  location ^~ /static/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $tenant_forwarded_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $tenant_forwarded_proto;
    proxy_set_header X-Forwarded-Host $tenant_forwarded_host;
    proxy_redirect off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri =404;
  }

  location ^~ /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    try_files $uri =404;
  }

  location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri $uri/ /index.html;
  }
}


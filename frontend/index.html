<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Pre-hydration locale/dir (WCAG 3.1.1). Sets <html lang>/<dir> from the
         stored/browser locale before #app paints. External file (not inline) so
         CSP can keep script-src 'self'. Must run before the module script. -->
    <script src="/locale-boot.js"></script>
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PWA manifest — dynamic (tenant-branded) for customer pages, static for
         owner/admin. External file (not inline) so CSP can stay script-src 'self'. -->
    <script src="/manifest-loader.js" defer></script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kepoli" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" content="#0b1c1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//images.unsplash.com" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="//maps.google.com" />
    <!-- Google Fonts — loaded non-blocking so the stylesheet never delays first
         paint. The media="print" trick makes the browser fetch it at low priority,
         then onload flips it to "all" so styles apply without a render-blocking
         round-trip. display=swap keeps text visible with the fallback font while
         woff2 files download. A <noscript> fallback restores blocking behaviour
         for the rare case where JS is disabled.
         NOTE: the onload attribute is an inline handler; if your CSP includes
         script-src 'self' without 'unsafe-inline', add a hash or nonce for this
         attribute, or move to a self-hosted font stack. -->
    <!-- Preload the LCP-path font (Space Grotesk 400) so it starts fetching
         as early as possible in the critical path. -->
    <link rel="preload" as="font" type="font/woff2"
          href="https://fonts.gstatic.com/s/spacegrotesk/v16/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gozuVa_IA.woff2"
          crossorigin />
    <link rel="stylesheet" media="print"
          onload="this.media='all'"
          href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Noto+Naskh+Arabic:wght@500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Noto+Naskh+Arabic:wght@500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    </noscript>
    <title>Kepoli — Order. Delivered. Earn.</title>
    <!-- Static OG defaults — text-only baseline for crawlers that slip past the
         nginx bot branch. Rich per-tenant previews (name, photo) come from the
         backend /api/og/ view, which social-bot user agents are routed to. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kepoli" />
    <meta property="og:title" content="Kepoli — Order food, shop local, ride" />
    <meta property="og:description" content="Order food, shop from local stores, send packages and book rides — one app, one wallet." />
    <meta name="description" content="Order food, shop from local stores, send packages and book rides — one app, one wallet." />
  </head>
  <body class="bg-slate-950 text-slate-50">
    <div id="app"></div>
    <noscript>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#94a3b8;text-align:center;padding:2rem;gap:0.75rem;">
        <p>This app requires JavaScript to be enabled in your browser.</p>
        <p lang="fr">Cette application nécessite l'activation de JavaScript dans votre navigateur.</p>
        <p lang="ar" dir="rtl">يتطلب هذا التطبيق تفعيل JavaScript في متصفحك.</p>
        <p><a href="mailto:contact@kepoli.app" style="color:#5eead4;">contact@kepoli.app</a></p>
      </div>
    </noscript>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- PWA manifest — dynamic (tenant-branded) for customer pages, static for
         owner/admin. External file (not inline) so CSP can stay script-src 'self'. -->
    <script src="/manifest-loader.js"></script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Resto" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="theme-color" content="#0b1c1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//images.unsplash.com" />
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="//maps.google.com" />
    <!-- Google Fonts. Loaded as a plain stylesheet (no inline onload handler)
         so CSP can keep script-src 'self'. display=swap keeps text visible with
         the fallback font while the web fonts download, so render isn't blocked. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Noto+Naskh+Arabic:wght@500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
    <title>Resto Menu</title>
  </head>
  <body class="bg-slate-950 text-slate-50">
    <div id="app"></div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#94a3b8;text-align:center;padding:2rem;">
        <p>This app requires JavaScript to be enabled in your browser.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>

# Dependabot config (R6 + R10): weekly dependency + CVE update PRs.
# Patch/minor bumps are grouped into a single PR per ecosystem to cut review
# noise; majors stay separate so breaking changes get individual scrutiny.
version: 2
updates:
  # Backend Python deps (pinned in backend/requirements.txt).
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      pip-patch-minor:
        update-types:
          - patch
          - minor

  # Frontend npm deps (frontend/package.json + package-lock.json).
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-patch-minor:
        update-types:
          - patch
          - minor

  # GitHub Actions used by the CI/deploy workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions-patch-minor:
        update-types:
          - patch
          - minor

  # R17: Docker base-image updates for backend/Dockerfile (python:3.12-slim).
  # Dependabot opens a PR whenever a new patch/minor tag is published for the
  # FROM image, keeping OS-level packages in the base layer current.
  # NOTE: Once R17b digest-pinning is implemented (FROM python@sha256:...),
  # Dependabot will also track digest updates automatically.
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      docker-backend-patch-minor:
        update-types:
          - patch
          - minor

  # R17: Docker base-image updates for frontend/Dockerfile (node:20-alpine,
  # nginx:1.27-alpine).  Both build and runner stages are tracked.
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      docker-frontend-patch-minor:
        update-types:
          - patch
          - minor

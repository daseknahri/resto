name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    # CI-wide env vars for all backend steps — override per-step if needed.
    # DJANGO_DEBUG=True: keeps dev-mode defaults (no SSL redirect, no HSTS) so
    # the plain HTTP test runner works without HTTPS infrastructure.
    env:
      DJANGO_SECRET_KEY: ci-test-only-not-a-real-secret-key
      DJANGO_DEBUG: "True"
      DATABASE_URL: postgres://resto:resto@localhost:5432/resto
    services:
      postgres:
        image: postgres:16
        ports: ["5432:5432"]
        env:
          POSTGRES_DB: resto
          POSTGRES_USER: resto
          POSTGRES_PASSWORD: resto
        options: >-
          --health-cmd="pg_isready -U resto" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          cd backend
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          # Test-only deps (pytest + pytz/pypdf the suite imports). The suite is a
          # pytest project; without these the runner can't even import several modules.
          pip install -r requirements-dev.txt
      - name: Backend lint (ruff — Pyflakes F rules)
        # Enforced backend equivalent of the frontend's eslint gate. Catches the
        # undefined-name / NameError class that previously shipped undetected (a
        # marketplace `Q` and 11 `models.F` uses, both fixed). Config in
        # backend/ruff.toml selects ONLY the F (Pyflakes) rules to stay low-noise.
        # ruff is a CI-only tool, installed inline like pip-audit below.
        run: |
          cd backend
          . .venv/bin/activate
          pip install ruff
          ruff check .
      - name: CVE scan (pip-audit)
        # R6: fail the build on any known CVE in the pinned dependencies.
        # After the dep bumps this runs clean with no ignores. If a specific
        # CVE ever has no in-range fix, add `--ignore-vuln <ID>` here with an
        # inline comment naming the CVE + why it is deferred — never blanket-disable.
        run: |
          cd backend
          . .venv/bin/activate
          pip install pip-audit
          pip-audit -r requirements.txt --progress-spinner off
      - name: Check migration drift
        run: |
          cd backend
          . .venv/bin/activate
          python manage.py makemigrations --check --dry-run
      - name: Run migrations (shared)
        run: |
          cd backend
          . .venv/bin/activate
          python manage.py migrate_schemas --shared
      - name: Run migrations (tenant)
        run: |
          cd backend
          . .venv/bin/activate
          python manage.py migrate_schemas --tenant
      - name: Seed plans
        run: |
          cd backend
          . .venv/bin/activate
          python manage.py seed_plans
      - name: Backend checks
        run: |
          cd backend
          . .venv/bin/activate
          python manage.py check
      - name: Export OpenAPI schema
        run: |
          cd backend
          . .venv/bin/activate
          python manage.py generateschema --format openapi-json --file openapi.json
      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: backend/openapi.json
      - name: Backend tests
        # Run the suite with pytest — its actual framework (pytest.ini +
        # DJANGO_SETTINGS_MODULE). The old `manage.py test` (unittest) couldn't import the
        # pytest-native modules and ignored the @pytest.mark.skipif(not _DB_AVAILABLE)
        # guards. With the CI Postgres service, the DB-backed tests run for real.
        #
        # PYTEST_REQUIRE_DB (TEST-1 item 1): DB tests must FAIL, not skip, when the DB
        # is absent here. tests/conftest.py asserts DB reachability at session start and
        # aborts the run if the Postgres service is gone; the _DB_AVAILABLE-style guards
        # re-raise instead of skipping. Locally the variable stays unset (no Postgres on
        # dev machines is the documented norm).
        env:
          PYTEST_REQUIRE_DB: "1"
        run: |
          cd backend
          . .venv/bin/activate
          set -o pipefail
          python -m pytest tests -q | tee pytest-summary.txt
          # TEST-1 floor: a collection error or a mass DB-self-skip must not pass CI as
          # "green" with a silently shrunken suite. Assert a floor on `passed` and a ceiling
          # on `skipped` (baseline was ~4707 passed / 24 skipped as of 2026-07-10; those 24
          # were the MFA DB tests whose availability probe always failed under pytest-django's
          # access blocker — fixed via tests/_dbprobe.py, so expect ~4731 passed / ~0 skipped.
          # Bump the floor up over time as the suite grows). The Postgres service above means
          # the DB-backed tests RUN here, so an abnormal skip spike means the DB went away and
          # those tests were quietly not exercised — exactly the false-green this guards against.
          summary="$(tail -n 20 pytest-summary.txt)"
          passed="$(echo "$summary" | grep -oE '[0-9]+ passed' | tail -1 | grep -oE '[0-9]+' || true)"
          skipped="$(echo "$summary" | grep -oE '[0-9]+ skipped' | tail -1 | grep -oE '[0-9]+' || true)"
          echo "backend tests: passed=${passed:-0} skipped=${skipped:-0}"
          if [ "${passed:-0}" -lt 4000 ]; then
            echo "::error::Backend test floor breached: only ${passed:-0} passed (expected >= 4000). A collection error or mass skip likely dropped tests."
            exit 1
          fi
          if [ "${skipped:-0}" -gt 100 ]; then
            echo "::error::Too many skipped backend tests (${skipped:-0} > 100) — the DB-backed tests may have been silently skipped."
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Align npm with the pinned dev toolchain
        # node 20 ships npm 10, whose `npm audit` can report advisories that a
        # current npm no longer flags (a known npm-10 audit quirk). Pin to a current
        # npm so the audit gate below matches a local `npm audit` and is reproducible
        # — a clean local audit and a clean CI audit should never disagree on the same
        # lockfile. Does NOT weaken the gate: npm 11 is newer, not older.
        run: npm install -g npm@11
      - name: Install deps
        run: |
          cd frontend
          npm ci
      - name: CVE scan (npm audit — full tree, blocking)
        # R6: fail on ANY moderate+ CVE across the FULL dependency tree (dev deps
        # included). This used to be `npm audit --omit=dev --audit-level=high`,
        # which silently buried six dev-dep advisories behind a prod-only filter —
        # most importantly a CRITICAL vitest UI-server arbitrary-file-read/exec
        # (GHSA-5xrq-8626-4rwp) that would never resurface in CI again.
        #
        # All of those are now fixed by upgrading the pinned dev tooling:
        #   - vitest  ^2.1.8 -> 3.2.6   (fixes CRITICAL GHSA-5xrq-8626-4rwp)
        #   - vite    5.4.8  -> 6.4.3   (fixes HIGH GHSA-fx2h-pf6j-xcff fs.deny
        #                                bypass + GHSA-4w7w-66w2-5vf9 /
        #                                GHSA-v6wh-96g9-6wx3; stays off the
        #                                breaking vite 7/8 line)
        #   - @vitejs/plugin-vue 5.1.2 -> 5.2.4  (peer-compat with vite 6)
        #   - eslint  9.10.0 -> 9.39.4 (fixes @eslint/plugin-kit ReDoS
        #                                GHSA-7q7g-4xm8-89cq / GHSA-xffm-g5w8-qvg7)
        #   - postcss 8.4.47 -> 8.5.15 (fixes moderate XSS GHSA-qx2v-qp2m-jg93)
        #   - esbuild pinned via `overrides` to ^0.28.1 (fixes moderate dev-server
        #                                CORS GHSA-67mh-4wv8-2f99 AND clears the
        #                                HIGH GHSA-gv7w-rqvm-qjhr, which is in fact
        #                                a *Deno-module-only* binary-integrity bug
        #                                that does not affect our Node/npm usage —
        #                                bumping to 0.28.1 removes it from the audit
        #                                rather than carrying an ignore for it)
        #
        # Result: `npm audit` reports 0 vulnerabilities at every severity, so the
        # gate needs NO `--ignore`/ignore-list today. If a future dev-only CVE ever
        # lacks an in-range fix, add a documented named-CVE deferral note right here
        # (CVE id + 'dev-only, not shipped' reason, mirroring the pip-audit gate) —
        # never re-add a blanket --omit=dev that hides critical advisories.
        run: |
          cd frontend
          npm audit --audit-level=moderate
      - name: CVE scan (npm audit — informational, never blocks)
        # Visibility net: prints the full audit (all severities incl. low) even
        # when the blocking gate above passes, so newly-disclosed low/dev CVEs
        # stay visible in CI logs instead of only surfacing on a bare local audit.
        if: always()
        continue-on-error: true
        run: |
          cd frontend
          npm audit || true
      - name: Verify, Lint, Test & Build
        env:
          VITE_API_BASE_URL: http://localhost:8000/api
        run: |
          cd frontend
          npm run verify:i18n
          npm run lint
          npm run test
          npm run build

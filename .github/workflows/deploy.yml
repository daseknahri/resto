name: deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  PLATFORM_DIR: platform

jobs:
  test:
    name: Validate Platform Stack
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.PLATFORM_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Docker Compose configuration
        run: docker compose config > /dev/null

      - name: Run platform smoke tests
        run: |
          node --check apps/frontend/server.js
          node --check apps/api/server.js
          node --check apps/admin/server.js

  build-and-push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./platform/apps/frontend
          - service: api
            context: ./platform/apps/api
          - service: admin
            context: ./platform/apps/admin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: prep
        shell: bash
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner }}/platform-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=platform-${{ matrix.service }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  coolify-redeploy:
    name: Trigger Coolify Redeploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Notify Coolify
        shell: bash
        env:
          COOLIFY_DEPLOY_WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_WEBHOOK" ]; then
            echo "Missing required secret: COOLIFY_DEPLOY_WEBHOOK" >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$COOLIFY_DEPLOY_WEBHOOK"

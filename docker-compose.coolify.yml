# Shared build config for customer-facing frontend and admin panel.
# Both are built from the same Dockerfile with the same ARGs; the YAML anchor
# avoids drift when new VITE_ vars are added (update once here, both services pick it up).
x-frontend-build: &frontend-build
  context: ./frontend
  dockerfile: Dockerfile
  args:
    VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    VITE_ADMIN_API_BASE_URL: ${VITE_ADMIN_API_BASE_URL}
    VITE_PLATFORM_PUBLIC_HOSTS: ${VITE_PLATFORM_PUBLIC_HOSTS}
    VITE_PUBLIC_DEMO_TENANT_SLUG: ${VITE_PUBLIC_DEMO_TENANT_SLUG}
    VITE_APP_NAME: ${VITE_APP_NAME}
    VITE_MAPS_URL: ${VITE_MAPS_URL}
    VITE_CONTACT_PHONE: ${VITE_CONTACT_PHONE}
    VITE_CONTACT_MESSAGE: ${VITE_CONTACT_MESSAGE}
    VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
    VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT}
    VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE}
    VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE}

services:
  frontend:
    build:
      <<: *frontend-build
    restart: unless-stopped
    init: true
    labels:
      - "traefik.enable=true"
      # nginx listens on 3000 (non-root UID 101 binds it; 3000 > 1024). Match Coolify's routing.
      - "traefik.http.services.menu-ibnbatoutaweb-com-frontend.loadbalancer.server.port=3000"
    depends_on:
      api:
        condition: service_healthy
    expose:
      # Container exposes 3000 (non-root nginx UID 101 binds it; 3000 > 1024).
      - "3000"
    # Mount media + static volumes read-only so nginx can serve files directly
    # without proxying through Django (faster and eliminates 404 race conditions).
    # static_data is populated by collectstatic in entrypoint.sh before api is healthy.
    volumes:
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
    healthcheck:
      # healthcheck hits the container port 3000.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM_LIMIT:-128m}

  admin:
    build:
      <<: *frontend-build
    restart: unless-stopped
    init: true
    depends_on:
      api:
        condition: service_healthy
    expose:
      # Container exposes 3000 (non-root nginx UID 101 binds it; 3000 > 1024).
      - "3000"
    volumes:
      - static_data:/app/staticfiles:ro
    healthcheck:
      # healthcheck hits the container port 3000.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM_LIMIT:-128m}

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    # R13: run as fixed non-root UID matching the Dockerfile USER directive.
    # Ensures the media_data volume and /app/staticfiles are writable at runtime.
    user: "10001:10001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.ibnbatoutaweb-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.ibnbatoutaweb-api-menu.rule=Host(`menu.ibnbatoutaweb.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ibnbatoutaweb-api-menu.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-menu.service=ibnbatoutaweb-api"
      - "traefik.http.routers.ibnbatoutaweb-api-admin.rule=Host(`admin.menu.ibnbatoutaweb.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ibnbatoutaweb-api-admin.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-admin.service=ibnbatoutaweb-api"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant.rule=HostRegexp(`{tenant:[a-z0-9-]+}.menu.ibnbatoutaweb.com`) && PathPrefix(`/api`)"
      # v2 rule syntax required for the {tenant:…} named HostRegexp capture under Traefik v3.
      - "traefik.http.routers.ibnbatoutaweb-api-tenant.rulesyntax=v2"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant.service=ibnbatoutaweb-api"
      # WebSocket routes (/ws) → backend (ASGI). Mirror the /api routers; Traefik
      # proxies the WS upgrade natively. Without these, /ws falls through to the
      # frontend nginx and the handshake fails.
      - "traefik.http.routers.ibnbatoutaweb-api-menu-ws.rule=Host(`menu.ibnbatoutaweb.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ibnbatoutaweb-api-menu-ws.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-menu-ws.service=ibnbatoutaweb-api"
      - "traefik.http.routers.ibnbatoutaweb-api-admin-ws.rule=Host(`admin.menu.ibnbatoutaweb.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ibnbatoutaweb-api-admin-ws.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-admin-ws.service=ibnbatoutaweb-api"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant-ws.rule=HostRegexp(`{tenant:[a-z0-9-]+}.menu.ibnbatoutaweb.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant-ws.rulesyntax=v2"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant-ws.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant-ws.service=ibnbatoutaweb-api"
      # Media files are now served directly by nginx from the shared volume.
      # The old /media/* Traefik labels that routed to Django are intentionally removed.
    environment: &django_env
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # Celery is OFF unless CELERY_BROKER_URL is set (then run the worker/beat services
      # below). Set it to the same value as REDIS_URL to enable the durable queue.
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      PUBLIC_MENU_BASE_URL: ${PUBLIC_MENU_BASE_URL}
      TENANT_DOMAIN_SUFFIX: ${TENANT_DOMAIN_SUFFIX}
      DJANGO_PUBLIC_SCHEMA_HOSTS: ${DJANGO_PUBLIC_SCHEMA_HOSTS}
      DJANGO_MEDIA_STORAGE_BACKEND: ${DJANGO_MEDIA_STORAGE_BACKEND}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE}
      AWS_S3_SIGNATURE_VERSION: ${AWS_S3_SIGNATURE_VERSION}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH}
      AWS_QUERYSTRING_EXPIRE: ${AWS_QUERYSTRING_EXPIRE}
      AWS_MEDIA_LOCATION: ${AWS_MEDIA_LOCATION}
      AWS_S3_OBJECT_CACHE_CONTROL: ${AWS_S3_OBJECT_CACHE_CONTROL}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE}
      DJANGO_SESSION_COOKIE_DOMAIN: ${DJANGO_SESSION_COOKIE_DOMAIN}
      DJANGO_CSRF_COOKIE_DOMAIN: ${DJANGO_CSRF_COOKIE_DOMAIN}
      DJANGO_SESSION_COOKIE_SAMESITE: ${DJANGO_SESSION_COOKIE_SAMESITE}
      DJANGO_CSRF_COOKIE_SAMESITE: ${DJANGO_CSRF_COOKIE_SAMESITE}
      DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST}
      DJANGO_SECURE_PROXY_SSL_HEADER: ${DJANGO_SECURE_PROXY_SSL_HEADER}
      DJANGO_ADMIN_URL: ${DJANGO_ADMIN_URL}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-86400}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD}
      DJANGO_X_FRAME_OPTIONS: ${DJANGO_X_FRAME_OPTIONS}
      DJANGO_REFERRER_POLICY: ${DJANGO_REFERRER_POLICY}
      DJANGO_DEFAULT_FROM_EMAIL: ${DJANGO_DEFAULT_FROM_EMAIL}
      DJANGO_SERVER_EMAIL: ${DJANGO_SERVER_EMAIL}
      DJANGO_EMAIL_BACKEND: ${DJANGO_EMAIL_BACKEND}
      DJANGO_EMAIL_HOST: ${DJANGO_EMAIL_HOST}
      DJANGO_EMAIL_PORT: ${DJANGO_EMAIL_PORT}
      DJANGO_EMAIL_HOST_USER: ${DJANGO_EMAIL_HOST_USER}
      DJANGO_EMAIL_HOST_PASSWORD: ${DJANGO_EMAIL_HOST_PASSWORD}
      DJANGO_EMAIL_USE_TLS: ${DJANGO_EMAIL_USE_TLS}
      DJANGO_EMAIL_USE_SSL: ${DJANGO_EMAIL_USE_SSL}
      DJANGO_EMAIL_TIMEOUT: ${DJANGO_EMAIL_TIMEOUT}
      DJANGO_EMAIL_FAIL_SILENTLY: ${DJANGO_EMAIL_FAIL_SILENTLY}
      DJANGO_SUPERADMIN_EMAIL: ${DJANGO_SUPERADMIN_EMAIL}
      DJANGO_SUPERADMIN_PASSWORD: ${DJANGO_SUPERADMIN_PASSWORD}
      DJANGO_LOG_FORMAT: ${DJANGO_LOG_FORMAT}
      DJANGO_REQUEST_LOG_LEVEL: ${DJANGO_REQUEST_LOG_LEVEL}
      DJANGO_PROVISIONING_LOG_LEVEL: ${DJANGO_PROVISIONING_LOG_LEVEL}
      DJANGO_SECURITY_LOG_LEVEL: ${DJANGO_SECURITY_LOG_LEVEL}
      DJANGO_EMAIL_LOG_LEVEL: ${DJANGO_EMAIL_LOG_LEVEL}
      ADMIN_AUDIT_RETENTION_DAYS: ${ADMIN_AUDIT_RETENTION_DAYS}
      DJANGO_SENTRY_DSN: ${DJANGO_SENTRY_DSN}
      DJANGO_SENTRY_ENVIRONMENT: ${DJANGO_SENTRY_ENVIRONMENT}
      DJANGO_SENTRY_RELEASE: ${DJANGO_SENTRY_RELEASE}
      DJANGO_SENTRY_TRACES_SAMPLE_RATE: ${DJANGO_SENTRY_TRACES_SAMPLE_RATE}
      DJANGO_SENTRY_SEND_PII: ${DJANGO_SENTRY_SEND_PII}
      DJANGO_SENTRY_CAPTURE_THROTTLE: ${DJANGO_SENTRY_CAPTURE_THROTTLE}
      DJANGO_SENTRY_THROTTLE_MIN_WAIT_SECONDS: ${DJANGO_SENTRY_THROTTLE_MIN_WAIT_SECONDS}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT}
      # R13/Goal-B: per-HTTP-request timeout (seconds). WebSockets AND the SSE
      # tracking stream (/api/marketplace/track/) are exempt — see config/asgi.py.
      # Default 120s is deliberately above the 90s SSE deadline so non-exempt API
      # calls keep comfortable headroom; set to 0 to disable the cap entirely.
      HTTP_REQUEST_TIMEOUT: ${HTTP_REQUEST_TIMEOUT:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health/').getcode() == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: ${API_MEM_LIMIT:-768m}

  # ── Celery worker — processes the notification queue ──────────────────────────
  # Idle (no-op) unless CELERY_BROKER_URL is set, so it's safe to deploy either way.
  # Shares the api environment via the &django_env anchor above.
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    # R13: match the non-root UID from the Dockerfile.
    user: "10001:10001"
    command: ["sh", "-c", "if [ -n \"$$CELERY_BROKER_URL\" ]; then exec celery -A config worker -l info -Q notifications,default --concurrency 2; else echo 'Celery OFF (CELERY_BROKER_URL unset) — worker idle'; exec sleep infinity; fi"]
    # Celery worker is NOT an HTTP service — disable the inherited Dockerfile
    # HEALTHCHECK (it probes the web server on :8000, which this container does not
    # run, so it would always report unhealthy). Liveness is covered by
    # restart: unless-stopped + the app's celery_beat_heartbeat check in /api/health/.
    healthcheck:
      disable: true
    environment: *django_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEM_LIMIT:-384m}

  # ── Celery beat — runs the scheduled cron jobs (release_scheduled_orders, etc.) ─
  # If you enable this, DO NOT also add the same commands as Coolify Scheduled Tasks
  # (§2b) — they would run twice. Idle unless CELERY_BROKER_URL is set.
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    # R13: match the non-root UID from the Dockerfile.
    user: "10001:10001"
    command: ["sh", "-c", "if [ -n \"$$CELERY_BROKER_URL\" ]; then exec celery -A config beat -l info; else echo 'Celery OFF (CELERY_BROKER_URL unset) — beat idle'; exec sleep infinity; fi"]
    # Celery beat is NOT an HTTP service — disable the inherited web HEALTHCHECK
    # (same rationale as the worker above).
    healthcheck:
      disable: true
    environment: *django_env
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${BEAT_MEM_LIMIT:-192m}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Performance tuning: env-driven so values can be overridden per VPS size without
    # rebuilding. Defaults are conservative for a small VPS (1-2 GB RAM).
    # max_connections=25 pairs with the uvicorn worker count (nproc*2+1 ≤ 25 on small VPS).
    # log_min_duration_statement=500 surfaces slow queries ≥500 ms in Postgres logs.
    command: >
      postgres
      -c shared_buffers=${PG_SHARED_BUFFERS:-256MB}
      -c effective_cache_size=${PG_EFFECTIVE_CACHE:-768MB}
      -c work_mem=${PG_WORK_MEM:-8MB}
      -c maintenance_work_mem=128MB
      -c max_connections=${PG_MAX_CONNECTIONS:-25}
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c random_page_cost=1.1
      -c log_min_duration_statement=500
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-1g}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-256m}

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:

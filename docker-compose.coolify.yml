services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_ADMIN_API_BASE_URL: ${VITE_ADMIN_API_BASE_URL}
        VITE_PLATFORM_PUBLIC_HOSTS: ${VITE_PLATFORM_PUBLIC_HOSTS}
        VITE_PUBLIC_DEMO_TENANT_SLUG: ${VITE_PUBLIC_DEMO_TENANT_SLUG}
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_MAPS_URL: ${VITE_MAPS_URL}
        VITE_CONTACT_PHONE: ${VITE_CONTACT_PHONE}
        VITE_CONTACT_MESSAGE: ${VITE_CONTACT_MESSAGE}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE}
    restart: unless-stopped
    init: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.menu-ibnbatoutaweb-com-frontend.loadbalancer.server.port=3000"
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    # Mount media volume read-only so nginx can serve uploaded files directly
    # without proxying through Django (faster and eliminates 404 race conditions).
    volumes:
      - media_data:/app/media:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  admin:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_ADMIN_API_BASE_URL: ${VITE_ADMIN_API_BASE_URL}
        VITE_PLATFORM_PUBLIC_HOSTS: ${VITE_PLATFORM_PUBLIC_HOSTS}
        VITE_PUBLIC_DEMO_TENANT_SLUG: ${VITE_PUBLIC_DEMO_TENANT_SLUG}
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_MAPS_URL: ${VITE_MAPS_URL}
        VITE_CONTACT_PHONE: ${VITE_CONTACT_PHONE}
        VITE_CONTACT_MESSAGE: ${VITE_CONTACT_MESSAGE}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE}
    restart: unless-stopped
    init: true
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.ibnbatoutaweb-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.ibnbatoutaweb-api-menu.rule=Host(`menu.ibnbatoutaweb.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ibnbatoutaweb-api-menu.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-menu.service=ibnbatoutaweb-api"
      - "traefik.http.routers.ibnbatoutaweb-api-admin.rule=Host(`admin.menu.ibnbatoutaweb.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ibnbatoutaweb-api-admin.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-admin.service=ibnbatoutaweb-api"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant.rule=HostRegexp(`{tenant:[a-z0-9-]+}.menu.ibnbatoutaweb.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant.service=ibnbatoutaweb-api"
      # WebSocket routes (/ws) → backend (ASGI). Mirror the /api routers; Traefik
      # proxies the WS upgrade natively. Without these, /ws falls through to the
      # frontend nginx and the handshake fails.
      - "traefik.http.routers.ibnbatoutaweb-api-menu-ws.rule=Host(`menu.ibnbatoutaweb.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ibnbatoutaweb-api-menu-ws.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-menu-ws.service=ibnbatoutaweb-api"
      - "traefik.http.routers.ibnbatoutaweb-api-admin-ws.rule=Host(`admin.menu.ibnbatoutaweb.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ibnbatoutaweb-api-admin-ws.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-admin-ws.service=ibnbatoutaweb-api"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant-ws.rule=HostRegexp(`{tenant:[a-z0-9-]+}.menu.ibnbatoutaweb.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant-ws.tls=true"
      - "traefik.http.routers.ibnbatoutaweb-api-tenant-ws.service=ibnbatoutaweb-api"
      # Media files are now served directly by nginx from the shared volume.
      # The old /media/* Traefik labels that routed to Django are intentionally removed.
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PUBLIC_MENU_BASE_URL: ${PUBLIC_MENU_BASE_URL}
      TENANT_DOMAIN_SUFFIX: ${TENANT_DOMAIN_SUFFIX}
      DJANGO_PUBLIC_SCHEMA_HOSTS: ${DJANGO_PUBLIC_SCHEMA_HOSTS}
      DJANGO_MEDIA_STORAGE_BACKEND: ${DJANGO_MEDIA_STORAGE_BACKEND}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      AWS_S3_CUSTOM_DOMAIN: ${AWS_S3_CUSTOM_DOMAIN}
      AWS_S3_ADDRESSING_STYLE: ${AWS_S3_ADDRESSING_STYLE}
      AWS_S3_SIGNATURE_VERSION: ${AWS_S3_SIGNATURE_VERSION}
      AWS_QUERYSTRING_AUTH: ${AWS_QUERYSTRING_AUTH}
      AWS_QUERYSTRING_EXPIRE: ${AWS_QUERYSTRING_EXPIRE}
      AWS_MEDIA_LOCATION: ${AWS_MEDIA_LOCATION}
      AWS_S3_OBJECT_CACHE_CONTROL: ${AWS_S3_OBJECT_CACHE_CONTROL}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE}
      DJANGO_SESSION_COOKIE_DOMAIN: ${DJANGO_SESSION_COOKIE_DOMAIN}
      DJANGO_CSRF_COOKIE_DOMAIN: ${DJANGO_CSRF_COOKIE_DOMAIN}
      DJANGO_SESSION_COOKIE_SAMESITE: ${DJANGO_SESSION_COOKIE_SAMESITE}
      DJANGO_CSRF_COOKIE_SAMESITE: ${DJANGO_CSRF_COOKIE_SAMESITE}
      DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST}
      DJANGO_SECURE_PROXY_SSL_HEADER: ${DJANGO_SECURE_PROXY_SSL_HEADER}
      DJANGO_ADMIN_URL: ${DJANGO_ADMIN_URL}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD}
      DJANGO_X_FRAME_OPTIONS: ${DJANGO_X_FRAME_OPTIONS}
      DJANGO_REFERRER_POLICY: ${DJANGO_REFERRER_POLICY}
      DJANGO_DEFAULT_FROM_EMAIL: ${DJANGO_DEFAULT_FROM_EMAIL}
      DJANGO_SERVER_EMAIL: ${DJANGO_SERVER_EMAIL}
      DJANGO_EMAIL_BACKEND: ${DJANGO_EMAIL_BACKEND}
      DJANGO_EMAIL_HOST: ${DJANGO_EMAIL_HOST}
      DJANGO_EMAIL_PORT: ${DJANGO_EMAIL_PORT}
      DJANGO_EMAIL_HOST_USER: ${DJANGO_EMAIL_HOST_USER}
      DJANGO_EMAIL_HOST_PASSWORD: ${DJANGO_EMAIL_HOST_PASSWORD}
      DJANGO_EMAIL_USE_TLS: ${DJANGO_EMAIL_USE_TLS}
      DJANGO_EMAIL_USE_SSL: ${DJANGO_EMAIL_USE_SSL}
      DJANGO_EMAIL_TIMEOUT: ${DJANGO_EMAIL_TIMEOUT}
      DJANGO_EMAIL_FAIL_SILENTLY: ${DJANGO_EMAIL_FAIL_SILENTLY}
      DJANGO_SUPERADMIN_EMAIL: ${DJANGO_SUPERADMIN_EMAIL}
      DJANGO_SUPERADMIN_PASSWORD: ${DJANGO_SUPERADMIN_PASSWORD}
      DJANGO_LOG_FORMAT: ${DJANGO_LOG_FORMAT}
      DJANGO_REQUEST_LOG_LEVEL: ${DJANGO_REQUEST_LOG_LEVEL}
      DJANGO_PROVISIONING_LOG_LEVEL: ${DJANGO_PROVISIONING_LOG_LEVEL}
      DJANGO_SECURITY_LOG_LEVEL: ${DJANGO_SECURITY_LOG_LEVEL}
      DJANGO_EMAIL_LOG_LEVEL: ${DJANGO_EMAIL_LOG_LEVEL}
      ADMIN_AUDIT_RETENTION_DAYS: ${ADMIN_AUDIT_RETENTION_DAYS}
      DJANGO_SENTRY_DSN: ${DJANGO_SENTRY_DSN}
      DJANGO_SENTRY_ENVIRONMENT: ${DJANGO_SENTRY_ENVIRONMENT}
      DJANGO_SENTRY_RELEASE: ${DJANGO_SENTRY_RELEASE}
      DJANGO_SENTRY_TRACES_SAMPLE_RATE: ${DJANGO_SENTRY_TRACES_SAMPLE_RATE}
      DJANGO_SENTRY_SEND_PII: ${DJANGO_SENTRY_SEND_PII}
      DJANGO_SENTRY_CAPTURE_THROTTLE: ${DJANGO_SENTRY_CAPTURE_THROTTLE}
      DJANGO_SENTRY_THROTTLE_MIN_WAIT_SECONDS: ${DJANGO_SENTRY_THROTTLE_MIN_WAIT_SECONDS}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health/').getcode() == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  media_data:
